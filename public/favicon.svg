  <rect x="4" y="4" width="56" height="12" rx="4" fill="#1a1a1a"/>
  <circle cx="12" cy="10" r="3" fill="#ff5f57"/>
  <circle cx="22" cy="10" r="3" fill="#ffbd2e"/>
  <circle cx="32" cy="10" r="3" fill="#28c840"/>
